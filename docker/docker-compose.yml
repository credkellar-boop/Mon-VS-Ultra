version: '3.8'

services:
  core-api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
      target: runner # Uses the production-ready stage from your Dockerfile
    container_name: mon-vs-core
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_started
    restart: unless-stopped

  postgres-db:
    image: postgres:15-alpine
    container_name: mon-vs-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monvs_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-monvs_unified}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monvs_admin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    container_name: mon-vs-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

volumes:
  pgdata:
  redisdata:
