name: Mon-VS-Ultra CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test Workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Dual-Linter
        run: npm run lint

      - name: Compile TypeScript & Core Pipelines
        run: npm run build

      - name: Execute Test Suite
        run: npm run test

  docker-verification:
    name: Verify Docker Ecosystem
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create placeholder .env file
        run: cp .env.example .env

      - name: Validate Docker Compose
        working-directory: ./docker
        run: docker compose config -q
